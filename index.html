<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Firaangis by TivraSaarthis — Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif, Helvetica, sans-serif; background: #252424; }

    .menu-images-section { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 0; }
    .menu-images-section h2 { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: #CC2200; margin-bottom: 1rem; }
    .menu-images-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
    .menu-images-grid img { width: 100%; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: block; transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: pointer; }
    .menu-images-grid img:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(204,34,0,0.2); }

  
    @media (max-width: 600px) { .menu-images-grid { grid-template-columns: 1fr; } .items-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="menu-images-section">
    <h2>FIRAANGIS MENU</h2>
    <div class="menu-images-grid">
      <img src="./PIC1-Menu.png" alt="Menu Item 1">
      <img src="./PIC2-Menu.png" alt="Menu Item 2">
      <img src="./PIC3-Menu.png" alt="Menu Item 3">
      <img src="./PIC4-Menu.png" alt="Menu Item 4">
    </div>
  </div>

</body>
</html>
